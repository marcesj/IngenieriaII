<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Etiquetas de Formularios</title>
</head>
<body class="container py-4">
    <!-- Título del tema usando <h1> y una breve introducción con <p> -->
    <h1 class="alert alert-warning">Etiquetas relacionadas con formularios</h1>
    <p>En esta página se muestran las etiquetas más usadas para capturar datos del usuario.</p>

    <!-- Formulario principal con <form>, agrupaciones con <fieldset> y título de grupo con <legend> -->
    <form class="border rounded p-4 bg-light">
        <fieldset class="mb-3">
            <legend>Datos personales</legend>

            <!-- <label> vincula texto descriptivo con cada campo <input> -->
            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre completo</label>
                <input type="text" id="nombre" class="form-control" placeholder="Ej: Marcelo Gómez">
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Correo electrónico</label>
                <input type="email" id="email" class="form-control" placeholder="correo@ejemplo.com">
            </div>

            <div class="mb-3">
                <label for="edad" class="form-label">Edad</label>
                <input type="number" id="edad" class="form-control" min="1" max="120">
            </div>
        </fieldset>

        <fieldset class="mb-3">
            <legend>Preferencias</legend>

            <!-- <select> y <option> para listas desplegables -->
            <div class="mb-3">
                <label for="lenguaje" class="form-label">Lenguaje favorito</label>
                <select id="lenguaje" class="form-select">
                    <option selected>Seleccionar...</option>
                    <option>HTML</option>
                    <option>CSS</option>
                    <option>JavaScript</option>
                    <option>Python</option>
                </select>
            </div>

            <!-- Inputs de selección: radio (una opción) y checkbox (múltiples opciones) -->
            <div class="mb-3">
                <p class="mb-1">Modalidad preferida</p>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="modalidad" id="virtual">
                    <label class="form-check-label" for="virtual">Virtual</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="modalidad" id="presencial">
                    <label class="form-check-label" for="presencial">Presencial</label>
                </div>
            </div>

            <div class="mb-3">
                <p class="mb-1">Temas de interés</p>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="tema-html">
                    <label class="form-check-label" for="tema-html">HTML semántico</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="tema-css">
                    <label class="form-check-label" for="tema-css">CSS y diseño responsivo</label>
                </div>
            </div>

            <!-- Campo de texto largo con <textarea> -->
            <div class="mb-3">
                <label for="comentarios" class="form-label">Comentarios</label>
                <textarea id="comentarios" class="form-control" rows="4" placeholder="Escribe tus comentarios..."></textarea>
            </div>
        </fieldset>

        <!-- Botones de acción: enviar y limpiar -->
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Enviar</button>
            <button type="reset" class="btn btn-secondary">Limpiar</button>
        </div>
    </form>

    <!-- Navegación para volver o ir a la página de etiquetas block -->
    <div class="mt-3 d-flex gap-2">
        <a class="btn btn-success" href="index.html">Volver al index</a>
        <a class="btn btn-primary" href="etiquetas-block.html">Ir a etiquetas block</a>
    </div>
</body>
</html>
