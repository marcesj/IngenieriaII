<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Etiquetas Inline</title>
</head>
<body class="container py-4">
    <h1 class="alert alert-warning">Ejemplos de etiquetas inline</h1>
    <hr/>
    <p>
        Este texto tiene <strong>strong</strong>, <em>em</em>, <mark style="background-color:lightblue;
                padding:10px;
                box-shadow: 8px 5px 5px rgba(0,0,0,0.4)">mark</mark> y
        <small>small</small> en una misma línea.
    </p>

    <p>
        También podemos usar <code>code</code>, fórmulas como H<sub>2</sub>O y potencias como 2<sup>3</sup>.
    </p>

    <p>
        Un ejemplo de <span class="text-primary">span con estilo Bootstrap</span> y un salto de línea<br>
        dentro del mismo párrafo.
    </p>

    <p>
        <a style="box-shadow: 8px 5px rgba(0, 0, 0, 0.4)" class="btn btn-primary" href="index.html">Volver al index</a>
    </p>
</body>
</html>
